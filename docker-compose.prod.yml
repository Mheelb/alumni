services:
  mongodb:
    image: mongo:latest
    container_name: alumni-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: alumni-api
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/alumni
      - PORT=3000
      - WEB_URL=http://localhost
    depends_on:
      - mongodb
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
    container_name: alumni-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongodb_data:
